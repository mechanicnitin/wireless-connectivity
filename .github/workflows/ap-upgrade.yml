name: AP Firmware Upgrade Pipeline (Merge)

on:
  push:
    branches:
      - main
    paths:
      - 'Dev/AP upgrade/site_list.csv'
  workflow_dispatch:

jobs:
  ap-upgrade-pipeline:
    name: AP Upgrade (Upgrade → Stabilize → Post-Val)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    # ✅ CRITICAL: Only run on merge (pull request merge commit message)
    if: |
      contains(github.event.head_commit.message, 'Merge pull request') || 
      github.event_name == 'workflow_dispatch'
    
    steps:
      # ============================================================================
      # STAGE 1: SETUP
      # ============================================================================
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests openpyxl

      - name: Create .env file from secrets
        run: |
          cat > .env << 'EOF'
          MIST_BASE_URL=${{ secrets.MIST_BASE_URL }}
          MIST_ORG_ID=${{ secrets.MIST_ORG_ID }}
          MIST_ACCESS_TOKEN=${{ secrets.MIST_ACCESS_TOKEN }}
          ALLOWED_MODELS=AP45
          RATE_LIMIT_DELAY_SECONDS=1
          MAX_RETRIES=5
          EOF
          chmod 600 .env
        env:
          MIST_BASE_URL: ${{ secrets.MIST_BASE_URL }}
          MIST_ORG_ID: ${{ secrets.MIST_ORG_ID }}
          MIST_ACCESS_TOKEN: ${{ secrets.MIST_ACCESS_TOKEN }}

      - name: Validate secrets are set
        run: |
          if [ -z "${{ secrets.MIST_BASE_URL }}" ] || [ -z "${{ secrets.MIST_ORG_ID }}" ] || [ -z "${{ secrets.MIST_ACCESS_TOKEN }}" ]; then
            echo "ERROR: Missing required GitHub Secrets"
            exit 1
          fi
          echo "✓ All required secrets are configured"

      # ============================================================================
      # STAGE 2: QUICK PRE-VALIDATION
      # ============================================================================
      - name: Quick AP status check (sanity check before upgrade)
        id: sanity_check
        timeout-minutes: 5
        run: |
          python "Dev/AP upgrade/validate_ap_status.py" \
            -c "Dev/AP upgrade/site_list.csv" \
            --tag pre \
            --env .env
        continue-on-error: true

      - name: Upload sanity check report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sanity-check-report
          path: upgrade_validation_pre_*.txt
          retention-days: 30
          if-no-files-found: ignore

      - name: Fail if sanity check failed
        if: steps.sanity_check.outcome == 'failure'
        run: |
          echo "❌ Sanity check FAILED. APs may have changed since PR approval."
          exit 1

      # ============================================================================
      # STAGE 3: UPGRADE
      # ============================================================================
      - name: Trigger AP firmware upgrades
        id: upgrade
        timeout-minutes: 15
        run: |
          python "Dev/AP upgrade/bulk_ap_upgrade.py" \
            -c "Dev/AP upgrade/site_list.csv" \
            --yes \
            --env .env
        continue-on-error: true

      - name: Fail if upgrade failed
        if: steps.upgrade.outcome == 'failure'
        run: |
          echo "❌ Upgrade trigger FAILED. No APs were upgraded."
          exit 1

      - name: Upload upgrade logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: upgrade-logs
          path: script.log
          retention-days: 30
          if-no-files-found: ignore

      # ============================================================================
      # STAGE 4: STABILIZATION WAIT (CRITICAL)
      # ============================================================================
      - name: Wait for AP stabilization
        id: stabilization
        env:
          TARGET_VERSION: $(head -2 "Dev/AP upgrade/site_list.csv" | tail -1 | cut -d',' -f2 | xargs)
        run: |
            python "Dev/AP upgrade/wait_for_ap_stabilization.py" \
            -c "Dev/AP upgrade/site_list.csv" \
            --target-version "$TARGET_VERSION" \
            --env .env

      - name: Fail if stabilization timeout
        if: steps.stabilization.outcome == 'failure'
        run: |
          echo "❌ Stabilization TIMEOUT. APs did not come online within 30 minutes."
          exit 1

      # ============================================================================
      # STAGE 5: POST-VALIDATION
      # ============================================================================
      - name: Post-validation - Confirm all APs on target version
        id: post_validation
        timeout-minutes: 10
        run: |
          python "Dev/AP upgrade/validate_ap_status.py" \
            -c "Dev/AP upgrade/site_list.csv" \
            --tag post \
            --env .env
        continue-on-error: true
        
      # ✅ CHANGE: Make the list of files step more verbose
      - name: List generated files (for debugging)
        if: always()
        run: |
            echo "=== FILES IN WORKSPACE ==="
            ls -la | grep upgrade_validation || echo "No validation files found"
            echo ""
            echo "=== ALL REPORTS ==="
            find . -name "upgrade_validation*.txt" -o -name "script.log" 2>/dev/null | sort
            echo ""
            echo "=== ARTIFACT CONTENTS ==="
            if ls upgrade_validation_*.txt 1> /dev/null 2>&1; then
              for f in upgrade_validation_*.txt; do
                echo "--- $f ---"
                head -20 "$f"
                echo "..."
              done
            fi
            
      - name: Upload post-validation report
        if: always() && steps.post_validation.outcome != 'skipped'
        uses: actions/upload-artifact@v4
        with:
            name: post-validation-report
            path: upgrade_validation_post_*.txt
            retention-days: 30
            if-no-files-found: warn

      - name: Fail if post-validation failed
        if: steps.post_validation.outcome == 'failure'
        run: |
          echo "❌ Post-validation FAILED. Some APs did not upgrade successfully."
          exit 1

      # ============================================================================
      # FINAL: SUCCESS
      # ============================================================================
      - name: Pipeline Success
        if: success()
        run: |
          echo "✅ AP Upgrade Pipeline COMPLETED SUCCESSFULLY"
          echo "All stages passed:"
          echo "  ✓ Sanity check"
          echo "  ✓ Upgrade trigger"
          echo "  ✓ Stabilization"
          echo "  ✓ Post-validation"

      - name: Pipeline Failure Summary
        if: failure()
        run: |
          echo "❌ AP Upgrade Pipeline FAILED"
          echo "Failed step: Check logs above for details"
          exit 1

      - name: Cleanup sensitive files
        if: always()
        run: |
          rm -f .env
          echo "✓ Cleaned up .env file"

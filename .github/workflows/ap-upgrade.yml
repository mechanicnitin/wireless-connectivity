name: AP Firmware Upgrade Pipeline

# TRIGGER: Only when CSV file changes are pushed to main
on:
  push:
    branches:
      - main
    paths:
      - 'Dev/AP upgrade/site_list.csv'  # ✅ Only triggers on CSV changes
      - '.github/wokrflows/ap-upgrade.yml'
  workflow_dispatch:
    # ⚠️ Restrict workflow_dispatch to admins only via branch protection rules

permissions:
  contents: read          # ✅ Minimal: only read repo content
  artifacts: write        # ✅ Minimal: only write artifacts
  id-token: write         # ✅ For OIDC token if using OpenID Connect

env:
  # ✅ SECURE: Use non-sensitive defaults; secrets come from GitHub Secrets
  ALLOWED_MODELS: "AP45,AP47"
  RATE_LIMIT_DELAY_SECONDS: "1"
  MAX_RETRIES: "5"

jobs:
  ap-upgrade-pipeline:
    name: AP Upgrade (Pre-Val → Upgrade → Stabilize → Post-Val)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    # ✅ SECURITY: Run only on main (no feature branches)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment: production  # ✅ NEW: Requires approval + uses environment secrets
    
    steps:
      # ============================================================================
      # STAGE 1: SETUP
      # ============================================================================
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1          # ✅ SECURITY: Minimal fetch
          persist-credentials: false  # ✅ SECURITY: Don't persist creds

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'            # ✅ PERFORMANCE: Cache dependencies

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir requests openpyxl
        # ✅ SECURITY: --no-cache-dir prevents caching build artifacts

      - name: Validate CSV file exists and is readable
        run: |
          if [ ! -f "Dev/AP upgrade/site_list.csv" ]; then
            echo "ERROR: CSV file not found"
            exit 1
          fi
          head -1 "Dev/AP upgrade/site_list.csv" | grep -q "site_name,target_version,scope"
          if [ $? -ne 0 ]; then
            echo "ERROR: CSV header is invalid"
            exit 1
          fi
          echo "✓ CSV file validation passed"
        # ✅ SECURITY: Validates file before processing

      - name: Create .env file from environment secrets
        run: |
          cat > .env << 'EOF'
          MIST_BASE_URL=${{ secrets.MIST_BASE_URL }}
          MIST_ORG_ID=${{ secrets.MIST_ORG_ID }}
          MIST_ACCESS_TOKEN=${{ secrets.MIST_ACCESS_TOKEN }}
          ALLOWED_MODELS=${ALLOWED_MODELS}
          RATE_LIMIT_DELAY_SECONDS=${RATE_LIMIT_DELAY_SECONDS}
          MAX_RETRIES=${MAX_RETRIES}
          EOF
          chmod 600 .env
          # ✅ SECURITY: Restrictive file permissions (owner read-write only)
          wc -l .env > /dev/null && echo "✓ .env created successfully"
        env:
          MIST_BASE_URL: ${{ secrets.MIST_BASE_URL }}
          MIST_ORG_ID: ${{ secrets.MIST_ORG_ID }}
          MIST_ACCESS_TOKEN: ${{ secrets.MIST_ACCESS_TOKEN }}

      - name: Validate secrets are set
        run: |
          # ✅ SECURITY: Never print secret values, only check if set
          [ -n "${{ secrets.MIST_BASE_URL }}" ] || { echo "ERROR: MIST_BASE_URL not set"; exit 1; }
          [ -n "${{ secrets.MIST_ORG_ID }}" ] || { echo "ERROR: MIST_ORG_ID not set"; exit 1; }
          [ -n "${{ secrets.MIST_ACCESS_TOKEN }}" ] || { echo "ERROR: MIST_ACCESS_TOKEN not set"; exit 1; }
          echo "✓ All required secrets are configured"

      - name: Scan CSV for injection attacks
        run: |
          # ✅ SECURITY: Basic CSV injection detection
          if grep -qE '(^=|^@|^\+|^-|;\s*bash|`|%0a|%0d|eval|exec|system)' "Dev/AP upgrade/site_list.csv"; then
            echo "ERROR: Suspicious pattern detected in CSV (potential injection attack)"
            exit 1
          fi
          echo "✓ CSV file appears safe"

      # ============================================================================
      # STAGE 2: PRE-VALIDATION
      # ============================================================================
      - name: Pre-validation - Check AP status before upgrade
        id: pre_validation
        run: |
          python "Dev/AP upgrade/validate_ap_status.py" \
            -c "Dev/AP upgrade/site_list.csv" \
            --tag pre \
            --env .env
        continue-on-error: true
        timeout-minutes: 10  # ✅ SECURITY: Prevent hanging

      - name: Upload pre-validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pre-validation-report
          path: upgrade_validation_pre_*.txt
          retention-days: 7        # ✅ SECURITY: Short retention (not 30 days)
          if-no-files-found: ignore
          compression-level: 6

      - name: Fail if pre-validation failed
        if: steps.pre_validation.outcome == 'failure'
        run: |
          echo "❌ Pre-validation FAILED. APs may not be in a good state before upgrade."
          exit 1

      # ============================================================================
      # STAGE 3: UPGRADE
      # ============================================================================
      - name: Trigger AP firmware upgrades
        id: upgrade
        run: |
          python "Dev/AP upgrade/bulk_ap_upgrade.py" \
            -c "Dev/AP upgrade/site_list.csv" \
            --yes \
            --env .env
        continue-on-error: true
        timeout-minutes: 15  # ✅ SECURITY: Prevent hanging

      - name: Fail if upgrade failed
        if: steps.upgrade.outcome == 'failure'
        run: |
          echo "❌ Upgrade trigger FAILED. No APs were upgraded."
          exit 1

      - name: Upload upgrade logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: upgrade-logs
          path: script.log
          retention-days: 7        # ✅ SECURITY: Short retention
          if-no-files-found: ignore
          compression-level: 6

      - name: Sanitize logs (remove sensitive data before artifact)
        if: always()
        run: |
          # ✅ SECURITY: Remove any token/password remnants from logs
          sed -i 's/Token [^ ]*/Token ***REDACTED***/g' script.log || true
          sed -i 's/token [^ ]*/token ***REDACTED***/g' script.log || true
          echo "✓ Logs sanitized"

      # ============================================================================
      # STAGE 4: STABILIZATION WAIT (CRITICAL)
      # ============================================================================
      - name: Wait for AP stabilization (poll every 2 min, max 30 min)
        id: stabilization
        run: |
          TARGET_VERSION=$(head -2 "Dev/AP upgrade/site_list.csv" | tail -1 | cut -d',' -f2 | xargs)
          # ✅ SECURITY: Validate target version format (basic)
          if [ -z "$TARGET_VERSION" ]; then
            echo "ERROR: Could not extract target version from CSV"
            exit 1
          fi
          echo "Target version: $TARGET_VERSION"
          
          python "Dev/AP upgrade/wait_for_ap_stabilization.py" \
            -c "Dev/AP upgrade/site_list.csv" \
            --target-version "$TARGET_VERSION" \
            --poll-interval 120 \
            --max-wait 1800 \
            --env .env
        continue-on-error: true
        timeout-minutes: 35  # ✅ SECURITY: Slightly longer than max-wait (1800s = 30min)

      - name: Fail if stabilization timeout
        if: steps.stabilization.outcome == 'failure'
        run: |
          echo "❌ Stabilization TIMEOUT. APs did not come online within 30 minutes."
          echo "Check the Mist dashboard and AP logs for connectivity issues."
          exit 1

      # ============================================================================
      # STAGE 5: POST-VALIDATION
      # ============================================================================
      - name: Post-validation - Confirm all APs on target version
        id: post_validation
        run: |
          python "Dev/AP upgrade/validate_ap_status.py" \
            -c "Dev/AP upgrade/site_list.csv" \
            --tag post \
            --env .env
        continue-on-error: true
        timeout-minutes: 10  # ✅ SECURITY: Prevent hanging

      - name: Upload post-validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: post-validation-report
          path: upgrade_validation_post_*.txt
          retention-days: 7        # ✅ SECURITY: Short retention
          if-no-files-found: ignore
          compression-level: 6

      - name: Fail if post-validation failed
        if: steps.post_validation.outcome == 'failure'
        run: |
          echo "❌ Post-validation FAILED. Some APs did not upgrade successfully."
          exit 1

      # ============================================================================
      # FINAL: SUCCESS & CLEANUP
      # ============================================================================
      - name: Pipeline Success
        if: success()
        run: |
          echo "✅ AP Upgrade Pipeline COMPLETED SUCCESSFULLY"
          echo "All stages passed:"
          echo "  ✓ Pre-validation"
          echo "  ✓ Upgrade trigger"
          echo "  ✓ Stabilization"
          echo "  ✓ Post-validation"

      - name: Pipeline Failure Summary
        if: failure()
        run: |
          echo "❌ AP Upgrade Pipeline FAILED"
          echo "Failed step: Check logs above for details"
          exit 1

      - name: Cleanup sensitive files
        if: always()
        run: |
          # ✅ SECURITY: Remove .env file immediately after use
          rm -f .env
          echo "✓ Cleaned up .env file"

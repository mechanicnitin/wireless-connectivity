name: AP Validation Check (PR)

on:
  pull_request:
    branches:
      - main
    paths:
      - 'Dev/AP upgrade/site_list.csv'

jobs:
  ap-validation-check:
    name: Validate AP Status (Pre-Check)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests openpyxl

      - name: Create .env file from secrets
        run: |
          cat > .env << 'EOF'
          MIST_BASE_URL=${{ secrets.MIST_BASE_URL }}
          MIST_ORG_ID=${{ secrets.MIST_ORG_ID }}
          MIST_ACCESS_TOKEN=${{ secrets.MIST_ACCESS_TOKEN }}
          ALLOWED_MODELS=AP45,AP47
          RATE_LIMIT_DELAY_SECONDS=1
          MAX_RETRIES=5
          EOF
          chmod 600 .env
        env:
          MIST_BASE_URL: ${{ secrets.MIST_BASE_URL }}
          MIST_ORG_ID: ${{ secrets.MIST_ORG_ID }}
          MIST_ACCESS_TOKEN: ${{ secrets.MIST_ACCESS_TOKEN }}

      - name: Validate secrets are set
        run: |
          if [ -z "${{ secrets.MIST_BASE_URL }}" ] || [ -z "${{ secrets.MIST_ORG_ID }}" ] || [ -z "${{ secrets.MIST_ACCESS_TOKEN }}" ]; then
            echo "ERROR: Missing required GitHub Secrets"
            exit 1
          fi
          echo "✓ All required secrets are configured"

      - name: Pre-validation - Check AP status before upgrade
        id: pre_validation
        timeout-minutes: 10
        run: |
          python "Dev/AP upgrade/validate_ap_status.py" \
            -c "Dev/AP upgrade/site_list.csv" \
            --tag pre \
            --env .env
        continue-on-error: true

      - name: Upload pre-validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-validation-report
          path: upgrade_validation_pre_*.txt
          retention-days: 7
          if-no-files-found: ignore

      - name: Comment PR with validation result
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const files = fs.readdirSync('.').filter(f => f.startsWith('upgrade_validation_pre_'));
            
            if (files.length === 0) {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: '⚠️ Pre-validation check could not be completed. Please check logs.'
              });
              return;
            }

            const report = fs.readFileSync(files[0], 'utf8');
            const summary = report.split('SUMMARY')[1]?.trim() || 'No summary found';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ✅ AP Pre-Validation Report\n\`\`\`\n${summary}\n\`\`\``
            });

      - name: Fail if pre-validation failed
        if: steps.pre_validation.outcome == 'failure'
        run: |
          echo "❌ Pre-validation FAILED. APs may not be in a good state."
          exit 1

      - name: Cleanup sensitive files
        if: always()
        run: |
          rm -f .env
          echo "✓ Cleaned up .env file"
